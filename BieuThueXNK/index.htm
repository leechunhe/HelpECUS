<script>
	$(function() {
		$("#Heading").load("Heading.html");
		let height = $(window).height();
		$('.heading').css('width',2502);
		let promiseDefaultLoad = [];
		let partLoaded = [];
		let part = 2;
		<!-- for(i=1;i<2;i++){ -->
			<!-- let promise = new Promise(function(resolve, reject) { -->
					<!-- $(`#Phan${i}`).load(`Phan${i}.html`,function(){ -->
						<!-- resolve("Done"); -->
					<!-- }); -->
				<!-- }); -->
			<!-- promiseDefaultLoad.push(promise) -->
		<!-- } -->
		<!-- Promise.all(promiseDefaultLoad).then(()=>{partLoaded.push(1);$('.spinner').addClass('hidden');}) -->
		
		//Khi scroll xuống cuối cùng
		$(window).scroll(function(event) {
			var Elm = document.scrollingElement;
			scrollWidth = Elm.scrollWidth;
			scrollHeight = Elm.scrollHeight;
			scrollTop = Elm.scrollTop;
			clientHeight = Elm.clientHeight;
			
			let bottom = Math.abs(scrollHeight - clientHeight - scrollTop);
			if(bottom == 0) {
				if(partLoaded.includes(part)){part++}
				$('.spinner').removeClass('hidden');
				let promise = new Promise(function(resolve, reject) {
					$(`#Phan${part}`).load(`Phan${part}.html`,function(){
						resolve("Done");
					});
				});
				promise.then(()=>{partLoaded.push(part);part++;$('.spinner').addClass('hidden');});
			}
		});
		//End
		
		//search
		function search(keyword){
			let arr_promise = [];
			let phan = [];
			keyword = keyword.toLowerCase();
			for(j=1;j<22;j++){
				let promise = new Promise(function(resolve, reject) {
					$.get(`Phan${j}.html`,function(src_str){
						resolve(src_str);
					},'html');
				});
				arr_promise.push(promise)
			}
			Promise.all(arr_promise)
			.then((result) => {
				let term = keyword.replace(/(\s+)/,"(<[^>]+>)*$1(<[^>]+>)*");
				let pattern = new RegExp("("+term+")", "gi");
				for(j=1;j<22;j++){
				    let src_str = result[j-1];
					let index = src_str.toLowerCase().indexOf(keyword);
					if (index >= 0) {
						if(j >= part && !partLoaded.includes(j)){
							$(`#Phan${j}`).html(src_str);
							partLoaded.push(j)
						}
						phan.push(j);
						
						//var custfilter = new RegExp(keyword, "ig");
						//var repstr = "<span class='highlight'>" + keyword + "</span>";
						

						if (keyword != "") {
							$(`#Phan${j} td`).filter(function() {
								let html = $(this).html().replace(pattern, "<mark>$1</mark>");
								html = html.replace(/(<mark>[^<>]*)((<[^>]+>)+)([^<>]*<\/mark>)/,"$1</mark>$2<mark>$4");
								$(this).html(html);
							})
							//$('body').html($('body').html().replaceAll('<mark></mark>','').replaceAll('<mark><mark>','<mark>').replaceAll('</mark></mark>','</mark>'));
						}
					}
				}
				let countTotal = $('mark').length;
				let countDup = $('mark mark').length;
				let countEmpty = $('mark:empty').length;
				let count = countTotal - countDup - countEmpty;
				$('.search-result .index-item').text('0');
				$('.search-result .total-item').text(count);
				
				if(count > 0){
					TargetSearchAction();
					$('.search-result .down').trigger('click');
				}
				else{
					$('.search-result').removeClass('hidden');
				}
			})
			.catch((e) => {
				// handle errors here
			});
			return phan;
		}
		//end search
		
		//Loại bỏ mark đã đánh dấu
		function removeMark() {
			$('mark').filter(function(){
				$(this).contents().unwrap();
			})
		}
		//end
		
		//Click button search
		$('.btn-search').off('click').on('click', function(){
			$('.search-result').addClass('hidden');
			$('.search-result .index-item').data('mark',-1);
			$('.search-result .index-item').text('0');
			$('.search-result .total-item').text('0');
			$('.spinner').removeClass('hidden');
			removeMark();
			
			keyword = $('[name=Keyword]').val().trim();
			if(keyword != ''){
				let section = $('[name=section]').val() || '';
				if(section == ''){
					let arrPhan = search(keyword);
				}
				else{
					searchInDocument(keyword,section);
				}
				
			}
			else{
				$('.spinner').addClass('hidden');
			}
		})
		
		//search trong document khi đã chọn phần
		function searchInDocument(keyword,section){
			$(`#Phan${section} td`).filter(function() {
				// Chuyển đổi chuỗi tìm kiếm và chuỗi trong ô td về dạng chữ thường
				var tdText = $(this).text().toLowerCase();
				searchText = keyword.toLowerCase();
				
				let term = keyword.replace(/(\s+)/,"(<[^>]+>)*$1(<[^>]+>)*");
				let pattern = new RegExp("("+term+")", "gi");
				
				if(tdText.indexOf(searchText) >= 0){
					let html = $(this).html().replace(pattern, "<mark>$1</mark>");
					html = html.replace(/(<mark>[^<>]*)((<[^>]+>)+)([^<>]*<\/mark>)/,"$1</mark>$2<mark>$4");
					$(this).html(html);
				}
				else{
					return false;
				}
			});
			let countTotal = $('mark').length;
			let countDup = $('mark mark').length;
			let countEmpty = $('mark:empty').length;
			let count = countTotal - countDup - countEmpty;
			$('.search-result .index-item').text('0');
			$('.search-result .total-item').text(count);
			if(count > 0){
				TargetSearchAction();
				$('.search-result .down').trigger('click');
			}
			else{
				$('.search-result').removeClass('hidden');
				$('.spinner').addClass('hidden');
			}
				
		}
		
		//Target vào kết quả tìm kiếm
		function TargetSearchAction(){
			$('.search-result .up').off('click').on('click',function(){
				
				let index = Number($('.search-result .index-item').text());
				let total = Number($('.search-result .total-item').text());
				if(index <= 1){ return false;}
				$('.focus-text').removeClass('focus-text');
				index = index > 1 ? index - 1 : index;
				let indexMark = $('.search-result .index-item').data('mark');
				if(total > 0){
					indexMark--;
					while($(`mark:eq(${indexMark})`).is(':empty') || $(`mark:eq(${indexMark})`).html().indexOf("mark") >= 0){
						indexMark--;
					}
					$('.search-result .index-item').data('mark',indexMark);
					let offsetMk = $(`td mark:eq(${indexMark})`).offset();
					window.scrollTo({ top: (offsetMk.top - 400), behavior: 'smooth'});
					$(`td mark:eq(${indexMark})`).addClass('focus-text');
					$('.spinner').addClass('hidden');
					$('.search-result .index-item').text(index);
					$('.search-result').removeClass('hidden');
				}
			})
			$('.search-result .down').off('click').on('click',function(){
				
				let index = Number($('.search-result .index-item').text());
				let total = Number($('.search-result .total-item').text());
				
				if(index >= total){ return false;}
				$('.focus-text').removeClass('focus-text');
				index = index < total ? index + 1 : total;
				let indexMark = $('.search-result .index-item').data('mark');
				if(total > 0){
					indexMark ++;
					while($(`mark:eq(${indexMark})`).is(':empty') || $(`mark:eq(${indexMark})`).html().indexOf("mark") >= 0){
						indexMark++;
					}
					$('.search-result .index-item').data('mark',indexMark);
					let offsetMk = $(`td mark:eq(${indexMark})`).offset();
					window.scrollTo({ top: (offsetMk.top - 400), behavior: 'smooth'});
					$(`td mark:eq(${indexMark})`).addClass('focus-text');
					$('.spinner').addClass('hidden');
					$('.search-result .index-item').text(index);
					$('.search-result').removeClass('hidden');
				}
			})
		}
		//end
		
		//Change Phần
		$('[name=section]').on('change',function(){
			$('.search-result .index-item').data('mark',-1);
			$('.search-result .index-item').text('0');
			$('.search-result .total-item').text('0');
			$('[name=Keyword]').val('');
			$('.search-result').addClass('hidden');
			$(`.section.hidden`).removeClass('hidden');
			let val = $(this).val() || '';
			if(val == ''){
				return false;
			}
			else{
				$('.spinner').removeClass('hidden');
				if(!partLoaded.includes(Number(val))){
					let promise = new Promise(function(resolve, reject) {
						$(`#Phan${val}`).load(`Phan${val}.html`,function(){
							resolve("Done");
						});
					});
					promise.then(()=>{
						partLoaded.push(Number(val));
						
						$('.spinner').addClass('hidden');
						$(`.section:not(#Phan${val})`).addClass('hidden');
					});
				}
				else{
					$('.spinner').addClass('hidden');
					$(`.section:not(#Phan${val})`).addClass('hidden');
				}
				window.scrollTo({ top: 0, behavior: 'smooth'});
			}
		})
		
		//Change Chương
		$('[name=Chapter]').on('change',function(){
			
			let val = $(this).val() || '';
			console.log("Change to " + val)
			if(val == ''){
				return false;
			}
			else{
				$('.spinner').removeClass('hidden');
				
				let section = $('[name=section]').val() || '';
				if(section != ''){
					let chapter = $(`Phan${section} td`).filter(function() {
						return $(this).text() === ("Chương "+val);
					});
					if(chapter.length > 0){
						let offsetChapter = chapter.offset();
						window.scrollTo({ top: (offsetChapter.top - 400), behavior: 'smooth'});
						$('.spinner').addClass('hidden');
					}
					else{
						alert(`Chương ${val} không nằm trong Phần ${section}. Vui lòng kiểm tra lại`);
					}
					
				}
				else{
					alert("Bạn cần chọn phần trước khi chọn chương");
				}
			}
		})
		$('[name=section]').trigger('change');
	});
</script>
